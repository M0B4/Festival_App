<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#e74c3c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FestGuide 2026</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>

    <header>
        <div class="app-logo-container">
            <img src="icons/header.svg" class="app-header-logo" alt="Logo">
        </div>

        <div class="top-nav">
            <div class="selector-row">
                <select id="festival-selector"></select>
                <button id="search-toggle-btn" title="Suche öffnen">
                <div class="tab-icon icon-search"></div>
            </button>
            </div>
            <button id="exclusive-btn">Exklusiv</button>
        </div>

        <div id="search-container" class="collapsed">
            <input type="text" id="search" placeholder="Band suchen...">
            <div id="stats">Lade...</div>
        </div>
    </header>

    <main class="content-area">
        <div id="lineup-view" class="view-container active">
            <div class="scroll-box">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 40px;">★</th>
                            <th id="sort-name" class="sortable">Band ↕</th>
                            <th id="sort-listeners" class="sortable" style="text-align: right;">Hörer ↕</th>
                            <th id="sort-genre" class="sortable" style="width: 85px; text-align: right;">Genre ↕</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>

        <div id="stats-view" class="view-container">
            <div class="scroll-box" id="genre-stats-content"></div>
        </div>

        <div id="settings-view" class="view-container">
            <div class="scroll-box settings-page">
                <h2>Einstellungen</h2>
                <div class="settings-group">
                    <p>Aktualisiere die App, um die neuesten Band-Bestätigungen und Design-Änderungen zu laden.</p>
                    <button id="update-app-btn" class="action-btn gold-btn">App jetzt aktualisieren</button>
                </div>

                <div class="settings-group">
                    <p>Vorsicht: Hiermit werden alle markierten Favoriten von allen Festivals unwiderruflich gelöscht.</p>
                    <button id="reset-favs-btn" class="action-btn red-btn">Favoriten zurücksetzen</button>
                </div>

                <div class="settings-footer">
                    Version 1.0.5 Build 2026
                </div>
            </div>
        </div>
    </main>

    <nav class="tab-bar">
        <button class="tab-btn active" data-target="lineup-view">
            <div class="tab-icon icon-bands"></div>
            <span class="tab-label">Bands</span>
        </button>
        <button class="tab-btn" data-target="stats-view">
            <div class="tab-icon icon-genre"></div>
            <span class="tab-label">Genre</span>
        </button>
        <button class="tab-btn" data-target="settings-view">
            <div class="tab-icon icon-settings"></div>
            <span class="tab-label">Einstellungen</span>
        </button>
    </nav>

    <script src="countries.js"></script>
    <script src="festivals.js"></script>
    <script src="app.js"></script>
</body>

</html>
