<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Festival Guide</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>

    <header>
        <div class="top-nav">
            <select id="festival-selector"></select>
            <button id="exclusive-btn">Exklusiv-Bands</button>
        </div>

        <h1 id="festival-title">FESTIVAL GUIDE</h1>

        <nav class="tab-bar">
            <button class="tab-btn active" data-target="lineup-view">Bands</button>
            <button class="tab-btn" data-target="stats-view">Genre</button>
        </nav>

        <div id="search-container">
            <input type="text" id="search" placeholder="Suche Band, Land oder Genre...">
        </div>
        <div id="stats">Lade Daten...</div>
    </header>

    <main class="content-area">
        <div id="lineup-view" class="view-container active">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th class="col-fav">★</th>
                            <th>Band</th>
                            <th class="col-genre">Genre</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>

        <div id="stats-view" class="view-container">
            <div class="stats-wrapper" id="genre-stats-content"></div>
        </div>
    </main>

    <script src="countries.js"></script>
    <script src="festivals.js"></script>
    <script src="app.js"></script>
</body>

</html>
