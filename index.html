<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wacken 2026 - Table View</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>WACKEN 2026</h1>
        <div class="controls">
            <input type="text" id="search" placeholder="Filter nach Name, Land oder Genre...">
        </div>
        <div id="stats">Wird geladen...</div>
    </header>

    <div class="table-container">
        <table id="band-table">
            <thead>
                <tr>
                    <th style="width: 40px;">★</th>
                    <th>Band Name</th>
                    <th>Herkunft</th>
                    <th>Genre</th>
                </tr>
            </thead>
            <tbody id="table-body">
            </tbody>
        </table>
    </div>

    <script src="app.js"></script>
</body>

</html>
