<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Festival Guide</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="top-nav">
            <select id="festival-selector"></select>
            <button id="exclusive-btn">Exklusiv-Bands</button>
        </div>
        <h1 id="festival-title">FESTIVAL GUIDE</h1>
        <div class="search-container">
            <input type="text" id="search" placeholder="Suche Band, Land oder Genre...">
        </div>
        <div id="stats">Lade Daten...</div>
    </header>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th class="col-fav">★</th>
                    <th>Band</th>
                    <th>Genre</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script src="countries.js"></script>
    <script src="festivals.js"></script>
    <script src="app.js"></script>
</body>

</html>
