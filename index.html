<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FestGuide 2026</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>

    <header>
        <div class="top-nav">
            <select id="festival-selector"></select>
            <button id="exclusive-btn">Exklusiv</button>
        </div>
        <h1>Festival Guide</h1>

        <div id="search-container">
            <input type="text" id="search" placeholder="Suchen...">
            <div id="stats">Lade...</div>
        </div>
    </header>

    <main class="content-area">
        <div id="lineup-view" class="view-container active">
            <div class="scroll-box">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 45px;">★</th>
                            <th>Band</th>
                            <th style="width: 90px; text-align: right;">Genre</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>

        <div id="stats-view" class="view-container">
            <div class="scroll-box" id="genre-stats-content"></div>
        </div>
    </main>

    <nav class="tab-bar">
        <button class="tab-btn active" data-target="lineup-view">
            <span class="tab-icon">🎸</span>
            <span class="tab-label">Bands</span>
        </button>
        <button class="tab-btn" data-target="stats-view">
            <span class="tab-icon">📊</span>
            <span class="tab-label">Genre</span>
        </button>
    </nav>

    <script src="countries.js"></script>
    <script src="festivals.js"></script>
    <script src="app.js"></script>
</body>

</html>
